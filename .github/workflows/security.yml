name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "30 2 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  trufflehog:
    name: Secret scan (TruffleHog OSS)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TruffleHog secret scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/workdir" ghcr.io/trufflesecurity/trufflehog:latest \
            git --fail --no-update file:///workdir
