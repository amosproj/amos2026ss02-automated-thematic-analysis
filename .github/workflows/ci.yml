name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-linux:
    name: Lint on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make setup.sh executable
        run: chmod +x ./setup.sh

      - name: Run linting using setup.sh
        run: ./setup.sh --lint

      - name: Clean up Docker Compose
        if: always()
        working-directory: Backend
        run: docker compose --profile test down -v

  test-linux:
    name: Tests and coverage on Linux
    runs-on: ubuntu-latest
    needs: lint-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make setup.sh executable
        run: chmod +x ./setup.sh

      - name: Run tests with coverage using setup.sh
        run: ./setup.sh --test

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report
          path: Backend/htmlcov
          if-no-files-found: warn

      - name: Clean up Docker Compose
        if: always()
        working-directory: Backend
        run: docker compose --profile test down -v

  build-linux:
    name: Build runtime image on Linux
    runs-on: ubuntu-latest
    needs: test-linux

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build production runtime image
        run: docker build --target runtime -t backend-runtime:test .

  lint-windows:
    name: Lint on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run linting using setup.ps1
        shell: pwsh
        run: .\setup.ps1 -Lint

      - name: Clean up Docker Compose
        if: always()
        working-directory: Backend
        shell: pwsh
        run: docker compose --profile test down -v

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    needs: lint-windows

    defaults:
      run:
        working-directory: Backend

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite+aiosqlite:///./test.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install uv
        shell: pwsh
        run: python -m pip install --upgrade pip uv

      - name: Install project with dev dependencies
        shell: pwsh
        run: uv pip install --system ".[dev]"

      - name: Python compile sanity check
        shell: pwsh
        run: python -m compileall app