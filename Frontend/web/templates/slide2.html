{% extends "base.html" %}
{% block title %}Slide 3 – Overview{% endblock %}

{% block head_extra %}
<style>
  body {
    background-color: #f8f9fa;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  
  .navbar, body > .site-footer, #ata-toasts, .site-flash {
    display: none !important;
  }

  .presentation-slide {
    width: 1280px;
    height: 720px;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px; /* Gives the image a nice white border */
  }
  
  .presentation-slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
</style>
{% endblock %}

{% block content %}
<div class="presentation-slide">
  <img src="{{ url_for('static', filename='img/pic4.png') }}" alt="Presentation Graphic">
</div>
{% endblock %}
