<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Thematic Analysis{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container-xl">
      <a class="navbar-brand fw-semibold" href="{{ url_for('main.index') }}">Thematic Analysis</a>
      <button class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mainNav"
              aria-controls="mainNav"
              aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}"
               href="{{ url_for('main.index') }}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'ingestion.list_transcripts' %}active{% endif %}"
               href="{{ url_for('ingestion.list_transcripts') }}">Transcripts</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint in ('ingestion.upload_form', 'ingestion.upload_submit') %}active{% endif %}"
               href="{{ url_for('ingestion.upload_form') }}">Upload</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint and request.endpoint.startswith('codebooks.') %}active{% endif %}"
               href="{{ url_for('codebooks.list_codebooks') }}">Codebooks</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'analysis.index' %}active{% endif %}"
               href="{{ url_for('analysis.index') }}">Analysis</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-4">
    <div class="container-xl">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
