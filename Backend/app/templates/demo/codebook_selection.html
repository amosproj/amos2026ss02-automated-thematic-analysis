{% extends "base.html" %}

{% block title %}Codebook Selection{% endblock %}

{% block content %}
<section
    id="selection-app"
    data-api-prefix="{{ api_prefix }}"
    data-initial-codebooks='{{ codebooks | tojson }}'
>
    <div class="d-flex justify-content-between align-items-end mb-3">
        <div>
            <h1 class="h4 mb-1">Codebook Selection</h1>
            <p class="text-secondary mb-0">
                Select a codebook version to open the theme overview demo.
            </p>
        </div>
    </div>

    <div class="table-responsive shadow-sm bg-white border rounded-2">
        <table class="table table-sm table-hover mb-0 align-middle">
            <thead class="table-light">
            <tr>
                <th scope="col" style="width: 96px;">Select</th>
                <th scope="col">Project</th>
                <th scope="col">Codebook</th>
                <th scope="col">Version</th>
            </tr>
            </thead>
            <tbody id="codebook-table-body">
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-end mt-3">
        <button id="open-overview-btn" class="btn btn-primary" type="button" disabled>
            Open Theme Overview
        </button>
    </div>
    <p id="selection-error" class="text-danger mt-2 mb-0 d-none"></p>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='demo_selection.js') }}"></script>
{% endblock %}
